name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Cache uv environment
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-publish-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-publish-py${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run linter
      run: |
        uv run ruff check src/mcp_read_only_grafana/ tests/

    - name: Run tests
      run: |
        uv run pytest -q

  package-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Validate tag matches package version
      run: |
        package_version="$(python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
        tag_version="${GITHUB_REF_NAME#v}"

        if [ "$package_version" != "$tag_version" ]; then
          echo "Tag version $tag_version does not match pyproject.toml version $package_version" >&2
          exit 1
        fi

    - name: Build package artifacts
      run: |
        uv build

    - name: Smoke test wheel
      run: |
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT
        uvx --from dist/*.whl mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --write-sample-config
        test -f "$tmp_dir/config/connections.yaml"
        test -f "$tmp_dir/config/connections.schema.json"
        uvx --from dist/*.whl mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --print-paths
        uvx --from dist/*.whl mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --allow-admin \
          --print-paths
        uvx --from dist/*.whl mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          validate-config \
          --print-paths
        uvx --from dist/*.whl mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          test-connection \
          --print-paths

    - name: Smoke test sdist
      run: |
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT
        uvx --from dist/*.tar.gz mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --write-sample-config
        test -f "$tmp_dir/config/connections.yaml"
        test -f "$tmp_dir/config/connections.schema.json"
        uvx --from dist/*.tar.gz mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --print-paths
        uvx --from dist/*.tar.gz mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --allow-admin \
          --print-paths
        uvx --from dist/*.tar.gz mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          validate-config \
          --print-paths
        uvx --from dist/*.tar.gz mcp-read-only-grafana \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          test-connection \
          --print-paths

  publish:
    runs-on: ubuntu-latest
    needs:
      - test
      - package-smoke
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-read-only-grafana

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Build package artifacts
      run: |
        uv build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
